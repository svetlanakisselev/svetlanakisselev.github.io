<body>

  <div data-include="components/header.html"></div>

  <section class="page-hero">
    <p class="eyebrow">Contact</p>
    <h1>Enquiries and commissions.</h1>
    <p>For acquisitions, press, gallery representation or private
       commissions, write directly — every message is read personally.</p>
  </section>

  <section class="contact">

    <!--
      This form is handled by js/contact-form.js, which sends
      submissions to a Cloudflare Worker (contact-form-handler),
      relaying them as a real email via Brevo.
    -->
    <form class="contact-form" data-managed-by="contact-worker">
      <label for="contact-name">Name
        <input type="text" id="contact-name" name="name" required>
      </label>

      <label for="contact-email">Email
        <input type="email" id="contact-email" name="email" required>
      </label>

      <label for="contact-message">Message
        <textarea id="contact-message" name="message" rows="5" required></textarea>
      </label>

      <button type="submit">Send message</button>
    </form>
    <p class="form-note" role="status"></p>

    <div class="contact-details">
      <p><strong>Studio enquiries</strong><br>contact@svetlanakisselev.com</p>
      <p><strong>Location</strong><br>By appointment — France</p>
    </div>

  </section>

  <!-- ================= WAITLIST MODULE (repeated) ================= -->
  <div data-include="components/newsletter.html"></div>

  <div data-include="components/footer.html"></div>

<script src="js/include.js"></script>
<script src="js/script.js"></script>
<script src="js/newsletter.js"></script>
<script src="js/contact-form.js"></script>
</body>
