<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Svetlana Kisselev</title>
<meta name="description" content="Contact Svetlana Kisselev — enquiries about Wearable Maximalist Baroque-Influenced Reliquary Art pieces, commissions and press.">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div data-include="components/header.html"></div>

  <section class="page-hero">
    <p class="eyebrow">Contact</p>
    <h1>Enquiries and commissions.</h1>
    <p>For acquisitions, press, gallery representation or private
       commissions, write directly — every message is read personally.</p>
  </section>

  <section class="contact">

    <!--
      NOTE: this is a static form with no backend yet. To receive real
      submissions, set the form's action to a service such as
      Formspree or Getform (e.g. action="https://formspree.io/f/yourID"
      method="POST"), then remove the preventDefault() for this form
      inside js/script.js so it submits normally.
    -->
    <form class="contact-form">
      <label for="contact-name">Name
        <input type="text" id="contact-name" name="name" required>
      </label>

      <label for="contact-email">Email
        <input type="email" id="contact-email" name="email" required>
      </label>

      <label for="contact-message">Message
        <textarea id="contact-message" name="message" rows="5" required></textarea>
      </label>

      <button type="submit">Send message</button>
    </form>
    <p class="form-note" role="status"></p>

    <div class="contact-details">
      <p><strong>Studio enquiries</strong><br>hello@svetlanakisselev.com</p>
      <p><strong>Location</strong><br>By appointment — France</p>
    </div>

  </section>

  <!-- ================= WAITLIST MODULE (repeated) ================= -->
  <div data-include="components/newsletter.html"></div>

  <div data-include="components/footer.html"></div>

<script src="js/include.js"></script>
<script src="js/script.js"></script>
<script src="js/newsletter.js"></script>
</body>
</html>
