<section class="waitlist">
  <h2>Be informed of upcoming unique pieces.</h2>
  <p>No noise, no newsletter in the ordinary sense — just a note when
     a new piece or series becomes available.</p>
  <form data-managed-by="newsletter">
    <label class="sr-only" for="waitlist-email">Email address</label>
    <input type="email" id="waitlist-email" placeholder="Your email" required>
    <button type="submit">Join the list</button>
  </form>
  <p class="form-note" role="status"></p>
</section>
